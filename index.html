<!DOCTYPE html>
<html>
    <!-- Use updated versions for better compatibility -->
    <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
    <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>
    
    <body style="margin: 0px; overflow: hidden;">
        <a-scene embedded arjs="sourceType: webcam; debugUIEnabled: false;">
            
            <a-marker preset="hiro">
                <!-- Removed the 'your-server/' prefix and fixed the path -->
                <a-entity
                    position="0 0 0"
                    scale="0.5 0.5 0.5"
                    gltf-model="https://raw.githack.com/AR-js-org/AR.js/master/aframe/examples/image-tracking/nft/trex/scene.gltf"
                ></a-entity>
            </a-marker>
            
            <a-entity camera></a-entity>
        </a-scene>
    </body>
</html>
